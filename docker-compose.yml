version: '3.8'

services:
  # 1. Database for Users and Interaction Logs
  mongodb:
    image: mongo:latest
    container_name: mike_ai_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # 2. Cache for quick session retrieval
  redis:
    image: redis:alpine
    container_name: mike_ai_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # 3. Vector Database for LLM Memory
  chromadb:
    image: chromadb/chroma:latest
    container_name: mike_ai_chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  # 4. Message Broker (Zookeeper is required for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: mike_ai_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # 5. Kafka for Node.js -> Python communication
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: mike_ai_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  mongo_data:
  chroma_data: